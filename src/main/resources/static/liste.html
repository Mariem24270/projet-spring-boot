<!DOCTYPE html>
<html>
<head>
    <title>Liste Dons</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Liste des Dons</h2>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Description</th>
            <th>Type</th>
            <th>Statut</th>
        </tr>
    </thead>

    <tbody id="table"></tbody>
</table>

<script>
fetch("http://localhost:8080/api/dons")
.then(res => res.json())
.then(data => {
    let table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(d => {
        table.innerHTML += `
        <tr>
            <td>${d.id}</td>
            <td>${d.titre}</td>
            <td>${d.description}</td>
            <td>${d.typeDon}</td>
            <td>${d.statut}</td>
        </tr>`;
    });
});
</script>

</body>
</html>
