<!DOCTYPE html>
<html>
<head>
    <title>Dons</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Liste des Dons</h2>

<button onclick="load()">Charger</button>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Description</th>
            <th>Type</th>
            <th>Statut</th>
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<script>
function load(){
    fetch("http://localhost:8080/api/dons")
    .then(r => r.json())
    .then(data => {
        let t = document.getElementById("table");
        t.innerHTML = "";

        data.forEach(d => {
            t.innerHTML += `
                <tr>
                    <td>${d.id}</td>
                    <td>${d.titre}</td>
                    <td>${d.description}</td>
                    <td>${d.typeDon}</td>
                    <td>${d.statut}</td>
                </tr>
            `;
        });
    });
}
</script>

</body>
</html>
